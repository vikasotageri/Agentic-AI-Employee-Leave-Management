{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex relative bg-gradient-to-br from-indigo-900 via-blue-800 to-violet-900">
  <div class="w-full flex items-center justify-center p-4 lg:p-12">
    <div class="w-full max-w-md">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl p-8 lg:p-10 border border-blue-300/30">
          <div class="text-center mb-8">
            <div class="text-6xl mb-4">👤</div>
            <h1 class="text-3xl lg:text-4xl font-bold text-white">HR Admin Portal</h1>
            <p class="text-blue-200 mt-2 text-lg">Manage the entire organization</p>
          </div>
        <div id="loginError" class="bg-red-500/20 border border-red-400/30 text-red-200 px-4 py-3 rounded-xl text-sm mb-4 hidden"></div>
          <form id="loginForm" class="space-y-5">
            <input type="hidden" id="loginRole" value="hr">
            <div>
              <label class="block text-sm font-medium text-blue-200 mb-1.5">Email Address</label>
              <input type="email" id="email" value="hr@company.com" class="w-full px-5 py-3.5 bg-white/10 border border-blue-300/30 rounded-xl text-white placeholder-blue-300/50 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-base backdrop-blur-sm transition">
            </div>
            <div>
              <label class="block text-sm font-medium text-blue-200 mb-1.5">Password</label>
              <input type="password" id="password" value="pass123" class="w-full px-5 py-3.5 bg-white/10 border border-blue-300/30 rounded-xl text-white placeholder-blue-300/50 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none text-base backdrop-blur-sm transition">
            </div>
          <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3.5 rounded-xl font-semibold text-base hover:from-blue-600 hover:to-indigo-700 transition-all shadow-lg shadow-blue-500/25">
            Sign In
          </button>
        </form>
        <div class="mt-6 p-4 bg-white/5 rounded-2xl border border-blue-300/20">
          <p class="text-xs font-semibold text-blue-300 uppercase tracking-wider mb-3">Demo Credentials</p>
          <div class="flex items-center gap-3 p-2.5 bg-blue-400/10 rounded-xl border border-blue-400/20 cursor-pointer hover:bg-blue-400/20 transition" onclick="fillLogin('hr@company.com','pass123')">
            <span class="w-8 h-8 flex items-center justify-center bg-blue-500/20 rounded-lg text-lg">👤</span>
            <div><p class="text-white font-medium">Demo HR Admin</p><p class="text-blue-300 text-xs">hr@company.com / pass123</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="absolute bottom-0 left-0 right-0 text-center pb-4">
    <div class="inline-flex items-center gap-2 bg-black/20 backdrop-blur-sm px-4 py-2 rounded-full">
      <span class="w-6 h-6 bg-gradient-to-br from-blue-400 to-indigo-500 rounded-lg flex items-center justify-center text-xs font-bold text-white">MS</span>
      <span class="text-blue-200/60 text-xs">Manipal School of Information Science, Manipal</span>
    </div>
  </div>
</div>
<script>document.title = "HR Login - MSIS";</script>
{% endblock %}
